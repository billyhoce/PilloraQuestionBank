# Host Nginx site for PilloraQuestionBank, behind Cloudflare.
#
# Cloudflare terminates browser TLS at its edge and proxies to this origin over
# HTTPS using a Cloudflare Origin Certificate. Set the zone's SSL/TLS mode to
# "Full (strict)". No Certbot/Let's Encrypt is needed. Lock the VM firewall so
# only Cloudflare IP ranges can reach port 443 (see docs/DEPLOYMENT.md).
#
# Install to /etc/nginx/sites-available/pillora.conf and symlink into
# sites-enabled/. The app is served on its own subdomain; www.pillora.com.sg
# stays on Wix (DNS-only) and is unaffected.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name questionbank.pillora.com.sg;

    # Cloudflare Origin Certificate (created in the Cloudflare dashboard).
    ssl_certificate     /etc/ssl/cloudflare/pillora-origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/pillora-origin.key;

    # Recover the real visitor IP from Cloudflare's header (otherwise every
    # request appears to come from a Cloudflare edge IP). Refresh these ranges
    # from https://www.cloudflare.com/ips/ — they change rarely.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # PDF exam papers can be large; allow generous upload bodies.
    client_max_body_size 100M;

    # Static SPA build (shipped by the deploy job).
    root /var/www/pillora;
    index index.html;

    # API -> Dockerized FastAPI backend on loopback.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Import pipeline (PDF -> images -> AI labeling) can be slow.
        proxy_read_timeout 300s;
    }

    # SPA client-side routing: fall back to index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Cloudflare handles browser-side HTTP->HTTPS via the "Always Use HTTPS" zone
# setting, and connects to this origin only over 443, so no port-80 server is
# needed. Keep the VM firewall closed on 80.
